<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobsly Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.15), transparent 25%);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        h1 {
            font-weight: 800;
            font-size: 2.5rem;
            margin: 0;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats {
            background: var(--card-bg);
            padding: 0.75rem 1.5rem;
            border-radius: 999px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            font-weight: 600;
        }

        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .search-input {
            flex: 1;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 1rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .job-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        .job-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .job-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .job-source {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            font-weight: 600;
            display: inline-block;
            background: rgba(255,255,255,0.05);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            align-self: flex-start;
        }

        .job-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0;
            line-height: 1.3;
        }

        .job-company {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin: -0.5rem 0 0 0;
        }

        .job-location {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: #cbd5e1;
        }

        .job-desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex: 1;
        }

        .job-link {
            display: inline-block;
            padding: 0.75rem 1rem;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            transition: background 0.2s ease;
            margin-top: auto;
        }

        .job-link:hover {
            background: var(--accent-hover);
        }

        .loading {
            text-align: center;
            padding: 4rem;
            color: var(--text-secondary);
            font-size: 1.2rem;
            grid-column: 1 / -1;
        }

        /* Micro-animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .job-card {
            animation: fadeIn 0.4s ease forwards;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Jobsly</h1>
            <div class="stats" id="job-count">0 Jobs Found</div>
        </header>

        <div class="controls">
            <input type="text" id="search-input" class="search-input" placeholder="Filter by title, company, or location...">
        </div>

        <div class="job-grid" id="job-grid">
            <div class="loading">Loading intelligent job matches...</div>
        </div>
    </div>

    <script>
        let allJobs = [];

        async function fetchJobs() {
            try {
                const response = await fetch('/api/jobs');
                const data = await response.json();
                allJobs = data.jobs || [];
                renderJobs(allJobs);
            } catch (error) {
                document.getElementById('job-grid').innerHTML = '<div class="loading">Failed to load jobs. Have you run the scraper yet?</div>';
            }
        }

        function renderJobs(jobsToRender) {
            const grid = document.getElementById('job-grid');
            const count = document.getElementById('job-count');
            
            count.textContent = `${jobsToRender.length} Jobs Found`;
            grid.innerHTML = '';

            if (jobsToRender.length === 0) {
                grid.innerHTML = '<div class="loading">No jobs match your criteria.</div>';
                return;
            }

            jobsToRender.forEach((job, index) => {
                const card = document.createElement('div');
                card.className = 'job-card';
                // Stagger animations
                card.style.animationDelay = `${index * 0.05}s`;
                
                card.innerHTML = `
                    <span class="job-source">${job.source || 'Aggregated'}</span>
                    <h3 class="job-title">${job.title}</h3>
                    <p class="job-company">${job.company}</p>
                    <div class="job-location">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                        ${job.location}
                    </div>
                    <div class="job-desc">${job.description || 'No description provided.'}</div>
                    <a href="${job.url}" target="_blank" class="job-link">View Application</a>
                `;
                
                grid.appendChild(card);
            });
        }

        // Search filtering
        document.getElementById('search-input').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allJobs.filter(job => 
                (job.title && job.title.toLowerCase().includes(term)) || 
                (job.company && job.company.toLowerCase().includes(term)) ||
                (job.location && job.location.toLowerCase().includes(term))
            );
            renderJobs(filtered);
        });

        // Init
        fetchJobs();
    </script>
</body>
</html>
